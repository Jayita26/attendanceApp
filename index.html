<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Attendance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.10/minified/html5-qrcode.min.js"></script>
<style>
body{background:#f8f9fa;}
.hidden{display:none;}
.fade-row{animation:fadeOut 5s forwards;}
@keyframes fadeOut{0%{opacity:1;}100%{opacity:0;display:none;}}
#qrcode canvas{margin:auto;display:block;}
#reader{width:100%;max-width:320px;margin:auto;}
</style>
</head>
<body class="container py-4">

<h2 class="text-center mb-4">Smart Attendance</h2>

<!-- Teacher login -->
<div id="teacherLogin" class="text-center mb-3">
  <input id="teacherPass" type="password" class="form-control d-inline-block w-auto" placeholder="Teacher password">
  <button class="btn btn-primary" onclick="loginTeacher()">Login</button>
</div>

<!-- Teacher panel -->
<div id="teacherPanel" class="hidden">
  <div class="card p-3 mb-3 shadow-sm">
    <div class="row align-items-center">
      <div class="col-md-6">
        <button class="btn btn-success me-2" onclick="startSession()">Start Session</button>
        <button class="btn btn-danger" onclick="endSession()">End Session</button>
      </div>
      <div class="col-md-6 text-end">
        <strong>Current code:</strong> <span id="sessionCode">—</span>
      </div>
    </div>
    <hr>
    <div class="row g-2 align-items-center">
      <div class="col-md-6">
        <label for="intervalSelect" class="form-label">QR refresh interval</label>
        <select id="intervalSelect" class="form-select">
          <option value="5">5 seconds</option>
          <option value="10" selected>10 seconds</option>
          <option value="30">30 seconds</option>
          <option value="60">1 minute</option>
          <option value="300">5 minutes</option>
        </select>
      </div>
      <div class="col-md-6">
        <label for="customInterval" class="form-label">Custom seconds</label>
        <input id="customInterval" type="number" class="form-control" placeholder="Enter seconds (optional)">
      </div>
    </div>
    <div class="text-center mt-3">
      <div id="qrcode"></div>
    </div>
  </div>

  <div class="card p-3 mb-3 shadow-sm">
    <h5>Live Attendance Feed</h5>
    <table class="table table-sm" id="liveTable">
      <thead><tr><th>Name</th><th>Roll</th><th>Branch</th><th>Verified</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="card p-3 shadow-sm hidden" id="summaryCard">
    <h5>Session Summary</h5>
    <p id="summaryText"></p>
  </div>
</div>

<!-- Student panel -->
<div id="studentPanel" class="card p-3 shadow-sm">
  <h5 class="mb-3">Student Attendance</h5>
  <div class="row g-2">
    <div class="col-md-6"><input id="name" class="form-control" placeholder="Name"></div>
    <div class="col-md-6"><input id="roll" class="form-control" placeholder="Roll"></div>
    <div class="col-md-6"><input id="gmail" class="form-control" placeholder="Gmail"></div>
    <div class="col-md-6">
      <select id="branch" class="form-select">
        <option value="">Select Branch</option>
        <option>MCA</option>
        <option>MDS</option>
        <option>BTECH</option>
        <option>MCS</option>
        <option>MTECH</option>
      </select>
    </div>
    <div class="col-12 d-grid">
      <button class="btn btn-primary" onclick="startScan()">Scan QR Code</button>
    </div>
  </div>

  <div id="reader" class="hidden mt-3"></div>

  <div id="manualDiv" class="hidden mt-3 text-center">
    <p>Verification failed. Request manual attendance?</p>
    <button class="btn btn-warning" onclick="sendManual()">Send Request</button>
  </div>
</div>

<script>
/* ---------- CONFIG ---------- */
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbycG3dntlbnYeR_ty2marQZk78RFp_BFuN9BPzHjOhebbuZdbMJ16GLb57NIc2jaS7gpg/exec';
const TEACHER_PASSWORD = 'pass@135790';
let currentCode = '';
let teacherLat, teacherLon;
let qrTimer;
let qrInterval = 10;
let html5QrCode;

/* ---------- TEACHER ---------- */
function loginTeacher(){
  const p=document.getElementById('teacherPass').value;
  if(p===TEACHER_PASSWORD){
    document.getElementById('teacherLogin').classList.add('hidden');
    document.getElementById('teacherPanel').classList.remove('hidden');
  } else alert('Wrong password');
}

function startSession(){
  const dropdownVal=parseInt(document.getElementById('intervalSelect').value);
  const customVal=parseInt(document.getElementById('customInterval').value);
  qrInterval = customVal>0?customVal:dropdownVal;

  navigator.geolocation.getCurrentPosition(pos=>{
    teacherLat=pos.coords.latitude;
    teacherLon=pos.coords.longitude;
    localStorage.setItem('teacherLat',teacherLat);
    localStorage.setItem('teacherLon',teacherLon);
  });

  document.getElementById('summaryCard').classList.add('hidden');
  alert('Session started. QR code will refresh every '+qrInterval+' seconds.');
  generateQR(); // first QR
  qrTimer=setInterval(generateQR, qrInterval*1000);
}

function generateQR(){
  currentCode = Math.floor(100000 + Math.random()*900000);
  document.getElementById('sessionCode').textContent = currentCode;
  localStorage.setItem('currentCode',currentCode);
  const qrDiv=document.getElementById('qrcode');
  qrDiv.innerHTML='';
  new QRCode(qrDiv,{text:currentCode,width:180,height:180});
}

function endSession(){
  clearInterval(qrTimer);
  document.getElementById('qrcode').innerHTML='';
  alert('Session ended. Attendance closed.');
  showSummary();
}

async function showSummary(){
  const res = await fetch(SCRIPT_URL+'?action=getSummary&code='+currentCode);
  try{
    const data = await res.json();
    document.getElementById('summaryText').innerHTML =
      `<strong>Total present:</strong> ${data.count}
<strong>Last code:</strong> ${currentCode}`;
  }catch(e){
    document.getElementById('summaryText').textContent='Summary unavailable (check sheet).';
  }
  document.getElementById('summaryCard').classList.remove('hidden');
}

/* ---------- STUDENT ---------- */
function startScan(){
  const readerDiv=document.getElementById('reader');
  readerDiv.classList.remove('hidden');
  html5QrCode = new Html5Qrcode("reader");
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText)=>{
      html5QrCode.stop();
      readerDiv.classList.add('hidden');
      markAttendance(decodedText);
    },
    (errorMessage)=>{ /* ignore scan errors */ }
  ).catch(err=>{
    alert('Camera error: '+err);
  });
}

async function markAttendance(scannedCode){
  const name=v('name'), roll=v('roll'), gmail=v('gmail'), branch=v('branch');
  if(!name||!roll||!gmail||!branch){alert('Fill all fields');return;}

  localStorage.setItem('studentName',name);
  localStorage.setItem('studentRoll',roll);
  localStorage.setItem('studentGmail',gmail);
  localStorage.setItem('studentBranch',branch);

  navigator.geolocation.getCurrentPosition(async pos=>{
    const tLat=parseFloat(localStorage.getItem('teacherLat'));
    const tLon=parseFloat(localStorage.getItem('teacherLon'));
    const dist = distance(pos.coords.latitude,pos.coords.longitude,tLat,tLon);
    if(dist<0.2){ // within 200 m
      await sendData('submitAttendance',{name,roll,gmail,branch,sessionCode:scannedCode,verifiedBy:'GPS'});
      alert('Attendance marked!');
      addLiveRow({name,roll,branch,verifiedBy:'GPS'});
    }else{
      document.getElementById('manualDiv').classList.remove('hidden');
    }
  },err=>{
    document.getElementById('manualDiv').classList.remove('hidden');
  },{enableHighAccuracy:false,timeout:10000});
}

async function sendManual(){
  const name=v('name'), roll=v('roll'), gmail=v('gmail'), branch=v('branch');
  await sendData('submitManualRequest',{name,roll,gmail,branch,sessionCode:'manual'});
  alert('Manual request sent.');
  document.getElementById('manualDiv').classList.add('hidden');
}

async function sendData(action,obj){
  obj.action=action;
  await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(obj)});
}

/* ---------- LIVE FEED ---------- */
function addLiveRow(entry){
  const tbody=document.querySelector('#liveTable tbody');
  const row=document.createElement('tr');
  row.innerHTML=`<td>${entry.name}</td><td>${entry.roll}</td><td>${entry.branch}</td><td>${entry.verifiedBy}</td>`;
  tbody.prepend(row);
  setTimeout(()=>row.classList.add('fade-row'),4000);
}

/* ---------- HELPERS ---------- */
function v(id){return document.getElementById(id).value;}
function distance(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+
          Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
          Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ---------- AUTO‑FILL ---------- */
window.onload=function(){
  document.getElementById('name').value=localStorage.getItem('studentName')||'';
  document.getElementById('roll').value=localStorage.getItem('studentRoll')||'';
  document.getElementById('gmail').value=localStorage.getItem('studentGmail')||'';
  document.getElementById('branch').value=localStorage.getItem('studentBranch')||'';
};
</script>
</body>
</html>
