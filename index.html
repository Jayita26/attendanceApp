<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Attendance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
body{background:#f8f9fa;}
.hidden{display:none;}
.fade-row{animation:fadeOut 5s forwards;}
@keyframes fadeOut{0%{opacity:1;}100%{opacity:0;display:none;}}
#qrcode canvas{margin:auto;display:block;}
#reader{width:100%;max-width:320px;margin:auto;}
</style>
</head>
<body class="container py-4">

<h2 class="text-center mb-4">Smart Attendance</h2>

<!-- Teacher login -->
<div id="teacherLogin" class="text-center mb-3">
  <input id="teacherPass" type="password" class="form-control d-inline-block w-auto" placeholder="Teacher password">
  <button class="btn btn-primary" onclick="loginTeacher()">Login</button>
</div>

<!-- Teacher panel -->
<div id="teacherPanel" class="hidden">
  <div class="card p-3 mb-3 shadow-sm">
    <div class="row align-items-center">
      <div class="col-md-6">
        <button class="btn btn-success me-2" onclick="startSession()">Start Session</button>
        <button class="btn btn-danger" onclick="endSession()">End Session</button>
      </div>
      <div class="col-md-6 text-end">
        <strong>Current code:</strong> <span id="sessionCode">—</span>
      </div>
    </div>
    <hr>
    <div class="row g-2 align-items-center">
      <div class="col-md-6">
        <label for="intervalSelect" class="form-label">QR refresh interval</label>
        <select id="intervalSelect" class="form-select">
          <option value="5">5 seconds</option>
          <option value="10" selected>10 seconds</option>
          <option value="30">30 seconds</option>
          <option value="60">1 minute</option>
          <option value="300">5 minutes</option>
        </select>
      </div>
      <div class="col-md-6">
        <label for="customInterval" class="form-label">Custom seconds</label>
        <input id="customInterval" type="number" class="form-control" placeholder="Enter seconds (optional)">
      </div>
    </div>
    <div class="text-center mt-3">
      <div id="qrcode"></div>
      <p class="text-muted mt-2">Students scan this QR code using the in‑app scanner.</p>
    </div>
  </div>

  <div class="card p-3 mb-3 shadow-sm">
    <h5>Live Attendance Feed</h5>
    <table class="table table-sm" id="liveTable">
      <thead><tr><th>Name</th><th>Roll</th><th>Branch</th><th>Verified</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- Student panel -->
<div id="studentPanel" class="card p-3 shadow-sm">
  <h5 class="mb-3">Student Registration / Attendance</h5>
  <div class="row g-2">
    <div class="col-md-6"><input id="name" class="form-control" placeholder="Name"></div>
    <div class="col-md-6"><input id="roll" class="form-control" placeholder="Roll"></div>
    <div class="col-md-6"><input id="gmail" class="form-control" placeholder="Gmail"></div>
    <div class="col-md-6">
      <select id="branch" class="form-select">
        <option value="">Select Branch</option>
        <option>MCA</option>
        <option>MDS</option>
        <option>BTECH</option>
        <option>MCS</option>
        <option>MTECH</option>
      </select>
    </div>
    <div class="col-12 d-grid">
      <button class="btn btn-secondary" onclick="registerDevice()">Register Device</button>
    </div>
    <div class="col-12 d-grid">
      <button class="btn btn-primary" onclick="startScan()">📷 Scan QR Code</button>
    </div>
  </div>

  <div id="reader" class="hidden mt-3"></div>
</div>

<script>
/* ---------- CONFIG ---------- */
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwhthjCpUhO02oDs3Ui4FiUnnPSFv7tZEDrvL6b2sjjtvwDdOp5rQWtfCNpAoCHmOLxzA/exec';
const TEACHER_PASSWORD = 'pass@135790';
let currentCode = '';
let qrTimer;
let qrInterval = 10;
let html5QrCode;

/* ---------- DEVICE ID ---------- */
if(!localStorage.getItem('deviceId')){
  localStorage.setItem('deviceId', crypto.randomUUID());
}
const deviceId = localStorage.getItem('deviceId');

/* ---------- TEACHER ---------- */
function loginTeacher(){
  const p=document.getElementById('teacherPass').value;
  if(p===TEACHER_PASSWORD){
    document.getElementById('teacherLogin').classList.add('hidden');
    document.getElementById('teacherPanel').classList.remove('hidden');
  } else alert('Wrong password');
}

function startSession(){
  const dropdownVal=parseInt(document.getElementById('intervalSelect').value);
  const customVal=parseInt(document.getElementById('customInterval').value);
  qrInterval = customVal>0?customVal:dropdownVal;
  alert('Session started. QR code will refresh every '+qrInterval+' seconds.');
  generateQR();
  qrTimer=setInterval(generateQR, qrInterval*1000);
}

function generateQR(){
  currentCode = Math.floor(100000 + Math.random()*900000);
  document.getElementById('sessionCode').textContent = currentCode;
  const qrDiv=document.getElementById('qrcode');
  qrDiv.innerHTML='';
  new QRCode(qrDiv,{text:currentCode,width:180,height:180});
}

function endSession(){
  clearInterval(qrTimer);
  document.getElementById('qrcode').innerHTML='';
  alert('Session ended. Attendance closed.');
}

/* ---------- STUDENT ---------- */
async function registerDevice(){
  const name=v('name'), roll=v('roll'), gmail=v('gmail'), branch=v('branch');
  if(!name||!roll||!gmail||!branch){alert('Fill all fields');return;}
  const res = await fetch(SCRIPT_URL,{
    method:'POST',
    body:JSON.stringify({action:'registerDevice',name,roll,gmail,branch,deviceId})
  });
  const text = await res.text();
  if(text==='registered') alert('Device registered successfully!');
  else if(text==='already_registered') alert('Device already registered for this roll.');
  else alert('Registration failed: '+text);
}

async function startScan() {
  const roll=v('roll');
  if(!roll){alert('Enter roll number before scanning.');return;}
  const valid = await validateDevice(roll);
  if(!valid) return;

  const readerDiv = document.getElementById('reader');
  readerDiv.classList.remove('hidden');

  try {
    if (typeof Html5Qrcode === 'undefined') {
      throw new Error("QR Library not loaded. Check internet connection.");
    }

    if (html5QrCode && html5QrCode.getState && html5QrCode.getState() === 2) {
      await html5QrCode.stop();
    }

    html5QrCode = new Html5Qrcode("reader");
    const qrConfig = { fps: 10, qrbox: { width: 250, height: 250 } };

    await html5QrCode.start(
      { facingMode: "environment" },
      qrConfig,
      (decodedText) => {
        console.log("QR Decoded:", decodedText);
        html5QrCode.stop().then(() => {
          readerDiv.classList.add('hidden');
          markAttendance(decodedText);
        });
      },
      (errorMessage) => { /* scanning... */ }
    );
  } catch (err) {
    console.error("Scanner Error:", err);
    alert("Camera Error: " + err.message);
    readerDiv.classList.add('hidden');
  }
}

async function validateDevice(roll){
  const res = await fetch(`${SCRIPT_URL}?action=validateDevice&roll=${roll}&deviceId=${deviceId}`);
  const text = await res.text();
  if(text!=='valid'){
    alert('This device is not registered for this roll.');
    return false;
  }
  return true;
}

async function markAttendance(scannedCode){
  const name=v('name'), roll=v('roll'), gmail=v('gmail'), branch=v('branch');
  if(!name||!roll||!gmail||!branch){alert('Fill all fields');return;}
  const res = await fetch(SCRIPT_URL,{
    method:'POST',
    body:JSON.stringify({
      action:'submitAttendance',
      name, roll, gmail, branch,
      deviceId,
      sessionCode: scannedCode,
      verifiedBy:'QR‑Only'
    })
  });
  const text = await res.text();
  if(text==='duplicate') alert('Attendance already submitted within the last hour.');
  else if(text==='ok') alert('Attendance marked successfully!');
  else alert('Response: '+text);
}

/* ---------- HELPERS ---------- */
function v(id){return document.getElementById(id).value;}
</script>
</body>
</html>
