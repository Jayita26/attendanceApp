<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Attendance</title>
<style>
body{font-family:sans-serif;margin:1em;}
.hidden{display:none;}
button{margin:.3em;padding:.5em 1em;}
table{border-collapse:collapse;width:100%;}
td,th{border:1px solid #ccc;padding:.3em;}
</style>
</head>
<body>

<h2>Smart Attendance</h2>

<!-- Teacher login -->
<div id="teacherLogin">
  <input id="teacherPass" type="password" placeholder="Teacher password">
  <button onclick="loginTeacher()">Login</button>
</div>

<!-- Teacher panel -->
<div id="teacherPanel" class="hidden">
  <button onclick="startSession()">Start Session</button>
  <p>Current code: <span id="sessionCode"></span></p>
  <h3>Pending Requests (open Sheet to approve)</h3>
  <p>Teacher can open Google Sheet to approve requests.</p>
</div>

<!-- Student panel -->
<div id="studentPanel">
  <input id="name" placeholder="Name">
  <input id="roll" placeholder="Roll">
  <input id="gmail" placeholder="Gmail">
  <input id="code" placeholder="Session code">
  <button onclick="markAttendance()">Mark Attendance</button>
  <div id="manualDiv" class="hidden">
    <p>Verification failed. Request manual attendance?</p>
    <button onclick="sendManual()">Send Request</button>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyreB_GD5El7IB7Yz2e7309UDj2Y15gC5zEeeVJxPFElYJApRzzhg8NOSC-GrG0g7Z01w/exec';
const TEACHER_PASSWORD = 'pass@135790';
let currentCode = '';
let teacherLat, teacherLon;

// ---------- Teacher ----------
function loginTeacher(){
  const p=document.getElementById('teacherPass').value;
  if(p===TEACHER_PASSWORD){
    document.getElementById('teacherLogin').classList.add('hidden');
    document.getElementById('teacherPanel').classList.remove('hidden');
  } else alert('Wrong password');
}

function startSession(){
  currentCode = Math.floor(100000 + Math.random()*900000);
  document.getElementById('sessionCode').textContent = currentCode;
  alert('Share this code with students: '+currentCode);
  navigator.geolocation.getCurrentPosition(pos=>{
    teacherLat=pos.coords.latitude;
    teacherLon=pos.coords.longitude;
    localStorage.setItem('teacherLat',teacherLat);
    localStorage.setItem('teacherLon',teacherLon);
  });
}

// ---------- Student ----------
async function markAttendance(){
  const name=v('name'), roll=v('roll'), gmail=v('gmail'), code=v('code');
  if(!name||!roll||!gmail||!code){alert('Fill all fields');return;}
  navigator.geolocation.getCurrentPosition(async pos=>{
    const tLat=parseFloat(localStorage.getItem('teacherLat'));
    const tLon=parseFloat(localStorage.getItem('teacherLon'));
    const dist = distance(pos.coords.latitude,pos.coords.longitude,tLat,tLon);
    if(dist<0.05){ // within 50 m
      await sendData('submitAttendance',{name,roll,gmail,sessionCode:code,verifiedBy:'GPS'});
      alert('Attendance marked!');
    }else{
      document.getElementById('manualDiv').classList.remove('hidden');
    }
  },err=>{
    document.getElementById('manualDiv').classList.remove('hidden');
  });
}

async function sendManual(){
  const name=v('name'), roll=v('roll'), gmail=v('gmail'), code=v('code');
  await sendData('submitManualRequest',{name,roll,gmail,sessionCode:code});
  alert('Manual request sent.');
  document.getElementById('manualDiv').classList.add('hidden');
}

async function sendData(action,obj){
  obj.action=action;
  await fetch(SCRIPT_URL,{
    method:'POST',
    body:JSON.stringify(obj)
  });
}

function v(id){return document.getElementById(id).value;}

function distance(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+
          Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
          Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
</script>
</body>
</html>
